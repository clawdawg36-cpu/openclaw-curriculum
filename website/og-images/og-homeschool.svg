<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6c5ce7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00b894;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Decorative grid lines -->
  <g stroke="#6c5ce7" stroke-opacity="0.08" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105" />
    <line x1="0" y1="210" x2="1200" y2="210" />
    <line x1="0" y1="315" x2="1200" y2="315" />
    <line x1="0" y1="420" x2="1200" y2="420" />
    <line x1="0" y1="525" x2="1200" y2="525" />
    <line x1="200" y1="0" x2="200" y2="630" />
    <line x1="400" y1="0" x2="400" y2="630" />
    <line x1="600" y1="0" x2="600" y2="630" />
    <line x1="800" y1="0" x2="800" y2="630" />
    <line x1="1000" y1="0" x2="1000" y2="630" />
  </g>

  <!-- Glow circles -->
  <circle cx="950" cy="280" r="300" fill="#00b894" fill-opacity="0.05" />
  <circle cx="950" cy="280" r="180" fill="#6c5ce7" fill-opacity="0.06" />

  <!-- Top accent bar -->
  <rect x="60" y="60" width="120" height="6" rx="3" fill="url(#accent)" />

  <!-- Logo / icon -->
  <g transform="translate(60, 100)">
    <circle cx="44" cy="44" r="12" fill="#6c5ce7" fill-opacity="0.9" />
    <ellipse cx="44" cy="44" rx="40" ry="16" fill="none" stroke="#6c5ce7" stroke-width="2.5" stroke-opacity="0.7" />
    <ellipse cx="44" cy="44" rx="40" ry="16" fill="none" stroke="#00b894" stroke-width="2.5" stroke-opacity="0.5" transform="rotate(60 44 44)" />
    <ellipse cx="44" cy="44" rx="40" ry="16" fill="none" stroke="#a29bfe" stroke-width="2.5" stroke-opacity="0.5" transform="rotate(120 44 44)" />
    <circle cx="44" cy="44" r="6" fill="white" fill-opacity="0.9" />
  </g>

  <!-- Label pill -->
  <rect x="60" y="195" width="230" height="38" rx="19" fill="#6c5ce7" fill-opacity="0.2" stroke="#6c5ce7" stroke-width="1.5" stroke-opacity="0.5" />
  <text x="175" y="220" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="600" fill="#a29bfe" text-anchor="middle" letter-spacing="1">HOMESCHOOL</text>

  <!-- Main title -->
  <text x="60" y="308" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="66" font-weight="900" fill="white" letter-spacing="-1.5">AI Explorers</text>

  <!-- Tagline -->
  <text x="60" y="370" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="30" font-weight="400" fill="#a29bfe">for Homeschool &amp; Unschool Families</text>

  <!-- Divider line -->
  <rect x="60" y="400" width="560" height="2" rx="1" fill="url(#accent)" fill-opacity="0.4" />

  <!-- Details -->
  <text x="60" y="450" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="24" font-weight="400" fill="#94a3b8">Self-paced · Ages 10–18 · No prior coding needed</text>
  <text x="60" y="488" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="24" font-weight="400" fill="#94a3b8">Free for all families, forever</text>

  <!-- Domain -->
  <text x="60" y="555" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="500" fill="#6c5ce7" fill-opacity="0.8">aiexplorers.io</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="618" width="1200" height="12" fill="url(#accent)" />
</svg>
