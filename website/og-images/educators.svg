<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D0F14;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161B27;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4F8FFF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7C5CFC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00D9B8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="title-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4F8FFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C5CFC;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="nebula1" cx="30%" cy="35%" r="45%">
      <stop offset="0%" style="stop-color:#4F8FFF;stop-opacity:0.10" />
      <stop offset="100%" style="stop-color:#4F8FFF;stop-opacity:0" />
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg-grad)"/>
  <rect width="1200" height="630" fill="url(#nebula1)"/>

  <!-- Grid -->
  <g opacity="0.04" stroke="#4F8FFF" stroke-width="1">
    <line x1="0" y1="90" x2="1200" y2="90"/><line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="270" x2="1200" y2="270"/><line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="450" x2="1200" y2="450"/><line x1="0" y1="540" x2="1200" y2="540"/>
    <line x1="150" y1="0" x2="150" y2="630"/><line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="450" y1="0" x2="450" y2="630"/><line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="750" y1="0" x2="750" y2="630"/><line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1050" y1="0" x2="1050" y2="630"/>
  </g>

  <!-- Top bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent-grad)"/>

  <!-- Audience pill -->
  <rect x="80" y="120" width="240" height="36" rx="18" fill="#4F8FFF" opacity="0.15"/>
  <rect x="80" y="120" width="240" height="36" rx="18" fill="none" stroke="#4F8FFF" stroke-width="1.5"/>
  <text x="200" y="143" font-family="Arial, Helvetica, sans-serif" font-weight="600" font-size="14" fill="#4F8FFF" text-anchor="middle" letter-spacing="1.5">CLASSROOM EDUCATORS</text>

  <!-- Title -->
  <text x="80" y="235" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="64" fill="url(#title-grad)" letter-spacing="-1">AI Explorers</text>
  <text x="80" y="305" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="40" fill="#C8D4F0">for Classroom Teachers</text>

  <!-- Divider -->
  <rect x="80" y="330" width="100" height="3" fill="url(#accent-grad)" rx="2"/>

  <!-- Key message -->
  <text x="80" y="385" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="22" fill="#8B9BC2">Complete curriculum. Every lesson planned.</text>
  <text x="80" y="418" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="22" fill="#8B9BC2">Every rubric written. No CS background needed.</text>

  <!-- Features -->
  <g font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#8B9BC2">
    <text x="80" y="470">✓ Standards-aligned · Grades 6–8</text>
    <text x="80" y="498">✓ 7 modules, fully scaffolded</text>
    <text x="80" y="526">✓ Free forever · Drop into any class</text>
  </g>

  <!-- URL -->
  <text x="80" y="595" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="16" fill="#4A5578">aiexplorers.dev/educators</text>

  <!-- Right: chalkboard/teaching motif -->
  <g transform="translate(960, 310)" opacity="0.55" filter="url(#glow)">
    <!-- Board -->
    <rect x="-90" y="-80" width="180" height="120" rx="8" fill="none" stroke="#4F8FFF" stroke-width="2" opacity="0.5"/>
    <rect x="-85" y="-75" width="170" height="110" rx="6" fill="#4F8FFF" opacity="0.04"/>
    <!-- "writing" lines on board -->
    <line x1="-65" y1="-45" x2="65" y2="-45" stroke="#7C5CFC" stroke-width="2" opacity="0.6"/>
    <line x1="-65" y1="-20" x2="40" y2="-20" stroke="#4F8FFF" stroke-width="2" opacity="0.6"/>
    <line x1="-65" y1="5" x2="55" y2="5" stroke="#00D9B8" stroke-width="2" opacity="0.6"/>
    <!-- chalk dot -->
    <circle cx="0" cy="-60" r="5" fill="#F5D769" opacity="0.8"/>
    <!-- Students (simple circles) -->
    <circle cx="-60" cy="80" r="18" fill="none" stroke="#4F8FFF" stroke-width="1.5" opacity="0.5"/>
    <circle cx="-60" cy="65" r="8" fill="#4F8FFF" opacity="0.5"/>
    <circle cx="0" cy="80" r="18" fill="none" stroke="#7C5CFC" stroke-width="1.5" opacity="0.5"/>
    <circle cx="0" cy="65" r="8" fill="#7C5CFC" opacity="0.5"/>
    <circle cx="60" cy="80" r="18" fill="none" stroke="#00D9B8" stroke-width="1.5" opacity="0.5"/>
    <circle cx="60" cy="65" r="8" fill="#00D9B8" opacity="0.5"/>
  </g>
</svg>
