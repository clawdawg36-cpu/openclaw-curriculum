<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D0F14;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161B27;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4F8FFF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7C5CFC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00D9B8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="title-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F5D769;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF7849;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="nebula1" cx="25%" cy="45%" r="45%">
      <stop offset="0%" style="stop-color:#F5D769;stop-opacity:0.08" />
      <stop offset="100%" style="stop-color:#F5D769;stop-opacity:0" />
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg-grad)"/>
  <rect width="1200" height="630" fill="url(#nebula1)"/>

  <!-- Grid -->
  <g opacity="0.04" stroke="#F5D769" stroke-width="1">
    <line x1="0" y1="90" x2="1200" y2="90"/><line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="270" x2="1200" y2="270"/><line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="450" x2="1200" y2="450"/><line x1="0" y1="540" x2="1200" y2="540"/>
    <line x1="150" y1="0" x2="150" y2="630"/><line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="450" y1="0" x2="450" y2="630"/><line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="750" y1="0" x2="750" y2="630"/><line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1050" y1="0" x2="1050" y2="630"/>
  </g>

  <!-- Top bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent-grad)"/>

  <!-- Audience pill -->
  <rect x="80" y="120" width="160" height="36" rx="18" fill="#F5D769" opacity="0.15"/>
  <rect x="80" y="120" width="160" height="36" rx="18" fill="none" stroke="#F5D769" stroke-width="1.5"/>
  <text x="160" y="143" font-family="Arial, Helvetica, sans-serif" font-weight="600" font-size="14" fill="#F5D769" text-anchor="middle" letter-spacing="1.5">FOR PARENTS</text>

  <!-- Title -->
  <text x="80" y="235" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="64" fill="url(#title-grad)" letter-spacing="-1">AI Explorers</text>
  <text x="80" y="305" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="40" fill="#C8D4F0">for Your Child's Future</text>

  <!-- Divider -->
  <rect x="80" y="330" width="100" height="3" fill="url(#accent-grad)" rx="2"/>

  <!-- Key message -->
  <text x="80" y="385" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="22" fill="#8B9BC2">Give your child a head start in the AI age.</text>
  <text x="80" y="418" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="22" fill="#8B9BC2">Safe, structured, and built to inspire.</text>

  <!-- Features -->
  <g font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#8B9BC2">
    <text x="80" y="470">✓ No screen-time guilt — project-driven learning</text>
    <text x="80" y="498">✓ Ages 10–18 · No prior experience needed</text>
    <text x="80" y="526">✓ Free forever · Created by educators</text>
  </g>

  <!-- URL -->
  <text x="80" y="595" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="16" fill="#4A5578">aiexplorers.dev</text>

  <!-- Right: family/growth motif -->
  <g transform="translate(960, 310)" opacity="0.6" filter="url(#glow)">
    <!-- Parent circle -->
    <circle cx="-30" cy="-50" r="30" fill="none" stroke="#F5D769" stroke-width="2" opacity="0.5"/>
    <circle cx="-30" cy="-70" r="12" fill="#F5D769" opacity="0.5"/>
    <!-- Child circle (smaller) -->
    <circle cx="50" cy="-20" r="22" fill="none" stroke="#FF7849" stroke-width="2" opacity="0.5"/>
    <circle cx="50" cy="-36" r="9" fill="#FF7849" opacity="0.5"/>
    <!-- Connecting arc -->
    <path d="M-10,-40 Q20,-70 40,-25" fill="none" stroke="url(#accent-grad)" stroke-width="2" opacity="0.5"/>
    <!-- Stars / sparkles -->
    <circle cx="80" cy="-80" r="4" fill="#F5D769" opacity="0.8"/>
    <circle cx="-80" cy="-90" r="3" fill="#4F8FFF" opacity="0.7"/>
    <circle cx="100" cy="30" r="3" fill="#00D9B8" opacity="0.7"/>
    <circle cx="-70" cy="40" r="2" fill="#7C5CFC" opacity="0.6"/>
    <!-- Growth arrow -->
    <path d="M-90,80 Q0,20 80,80" fill="none" stroke="#F5D769" stroke-width="1.5" opacity="0.4"/>
    <polygon points="80,80 70,68 90,70" fill="#F5D769" opacity="0.5"/>
    <!-- AI star -->
    <circle cx="10" cy="-10" r="6" fill="#00D9B8" opacity="0.9"/>
    <circle cx="10" cy="-10" r="12" fill="none" stroke="#00D9B8" stroke-width="1" opacity="0.4"/>
  </g>
</svg>
