<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D0F14;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161B27;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4F8FFF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7C5CFC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00D9B8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="title-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00D9B8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C5CFC;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="nebula1" cx="15%" cy="55%" r="40%">
      <stop offset="0%" style="stop-color:#00D9B8;stop-opacity:0.09" />
      <stop offset="100%" style="stop-color:#00D9B8;stop-opacity:0" />
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg-grad)"/>
  <rect width="1200" height="630" fill="url(#nebula1)"/>

  <!-- Grid -->
  <g opacity="0.04" stroke="#00D9B8" stroke-width="1">
    <line x1="0" y1="90" x2="1200" y2="90"/><line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="270" x2="1200" y2="270"/><line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="450" x2="1200" y2="450"/><line x1="0" y1="540" x2="1200" y2="540"/>
    <line x1="150" y1="0" x2="150" y2="630"/><line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="450" y1="0" x2="450" y2="630"/><line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="750" y1="0" x2="750" y2="630"/><line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1050" y1="0" x2="1050" y2="630"/>
  </g>

  <!-- Top bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent-grad)"/>

  <!-- Audience pill -->
  <rect x="80" y="120" width="300" height="36" rx="18" fill="#00D9B8" opacity="0.12"/>
  <rect x="80" y="120" width="300" height="36" rx="18" fill="none" stroke="#00D9B8" stroke-width="1.5"/>
  <text x="230" y="143" font-family="Arial, Helvetica, sans-serif" font-weight="600" font-size="14" fill="#00D9B8" text-anchor="middle" letter-spacing="1.5">PUBLIC OFFICIALS &amp; DECISION MAKERS</text>

  <!-- Title -->
  <text x="80" y="235" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="64" fill="url(#title-grad)" letter-spacing="-1">AI Explorers</text>
  <text x="80" y="305" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="40" fill="#C8D4F0">Policy Brief</text>

  <!-- Divider -->
  <rect x="80" y="330" width="100" height="3" fill="url(#accent-grad)" rx="2"/>

  <!-- Key message -->
  <text x="80" y="385" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="22" fill="#8B9BC2">Equity-first AI literacy for every student.</text>
  <text x="80" y="418" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="22" fill="#8B9BC2">Free forever. Built to scale.</text>

  <!-- Features -->
  <g font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#8B9BC2">
    <text x="80" y="470">✓ From one classroom to district-wide</text>
    <text x="80" y="498">✓ Open license, no vendor dependency</text>
    <text x="80" y="526">✓ Aligned with national AI literacy frameworks</text>
  </g>

  <!-- URL -->
  <text x="80" y="595" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="16" fill="#4A5578">aiexplorers.dev/policy</text>

  <!-- Right: scales of justice / balance motif -->
  <g transform="translate(960, 300)" opacity="0.55" filter="url(#glow)">
    <!-- Scale post -->
    <line x1="0" y1="-130" x2="0" y2="80" stroke="#00D9B8" stroke-width="3" opacity="0.6"/>
    <!-- Scale beam -->
    <line x1="-90" y1="-60" x2="90" y2="-60" stroke="#00D9B8" stroke-width="2" opacity="0.7"/>
    <!-- Left pan -->
    <line x1="-90" y1="-60" x2="-90" y2="-10" stroke="#4F8FFF" stroke-width="1.5" opacity="0.6"/>
    <ellipse cx="-90" cy="-5" rx="35" ry="12" fill="none" stroke="#4F8FFF" stroke-width="1.5" opacity="0.6"/>
    <!-- Right pan -->
    <line x1="90" y1="-60" x2="90" y2="-10" stroke="#7C5CFC" stroke-width="1.5" opacity="0.6"/>
    <ellipse cx="90" cy="-5" rx="35" ry="12" fill="none" stroke="#7C5CFC" stroke-width="1.5" opacity="0.6"/>
    <!-- Center jewel -->
    <circle cx="0" cy="-60" r="8" fill="#00D9B8" opacity="0.9"/>
    <!-- Base -->
    <rect x="-40" y="80" width="80" height="10" rx="5" fill="none" stroke="#00D9B8" stroke-width="2" opacity="0.5"/>
    <!-- Stars -->
    <circle cx="-120" cy="-100" r="3" fill="#F5D769" opacity="0.7"/>
    <circle cx="120" cy="-80" r="2" fill="#4F8FFF" opacity="0.7"/>
    <circle cx="110" cy="50" r="3" fill="#7C5CFC" opacity="0.5"/>
  </g>
</svg>
