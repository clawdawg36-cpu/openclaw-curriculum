<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D0F14;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161B27;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4F8FFF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7C5CFC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00D9B8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="title-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4F8FFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C5CFC;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="nebula1" cx="20%" cy="30%" r="40%">
      <stop offset="0%" style="stop-color:#4F8FFF;stop-opacity:0.12" />
      <stop offset="100%" style="stop-color:#4F8FFF;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="nebula2" cx="80%" cy="70%" r="35%">
      <stop offset="0%" style="stop-color:#7C5CFC;stop-opacity:0.10" />
      <stop offset="100%" style="stop-color:#7C5CFC;stop-opacity:0" />
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg-grad)"/>
  <rect width="1200" height="630" fill="url(#nebula1)"/>
  <rect width="1200" height="630" fill="url(#nebula2)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#4F8FFF" stroke-width="1">
    <line x1="0" y1="90" x2="1200" y2="90"/>
    <line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="270" x2="1200" y2="270"/>
    <line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="450" x2="1200" y2="450"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
    <line x1="150" y1="0" x2="150" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="450" y1="0" x2="450" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="750" y1="0" x2="750" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1050" y1="0" x2="1050" y2="630"/>
  </g>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent-grad)"/>

  <!-- Module dots row - visual motif -->
  <g opacity="0.6" filter="url(#glow)">
    <circle cx="860" cy="180" r="28" fill="none" stroke="#4F8FFF" stroke-width="2" opacity="0.5"/>
    <circle cx="860" cy="180" r="8" fill="#4F8FFF"/>
    <circle cx="940" cy="220" r="22" fill="none" stroke="#7C5CFC" stroke-width="2" opacity="0.5"/>
    <circle cx="940" cy="220" r="6" fill="#7C5CFC"/>
    <circle cx="1010" cy="170" r="18" fill="none" stroke="#00D9B8" stroke-width="2" opacity="0.5"/>
    <circle cx="1010" cy="170" r="5" fill="#00D9B8"/>
    <circle cx="1070" cy="240" r="14" fill="none" stroke="#F5D769" stroke-width="2" opacity="0.5"/>
    <circle cx="1070" cy="240" r="4" fill="#F5D769"/>
    <circle cx="1110" cy="190" r="10" fill="none" stroke="#FF7849" stroke-width="2" opacity="0.4"/>
    <circle cx="1110" cy="190" r="3" fill="#FF7849"/>
    <!-- connector lines -->
    <line x1="860" y1="180" x2="940" y2="220" stroke="url(#accent-grad)" stroke-width="1.5" opacity="0.4"/>
    <line x1="940" y1="220" x2="1010" y2="170" stroke="url(#accent-grad)" stroke-width="1.5" opacity="0.4"/>
    <line x1="1010" y1="170" x2="1070" y2="240" stroke="url(#accent-grad)" stroke-width="1.5" opacity="0.4"/>
    <line x1="1070" y1="240" x2="1110" y2="190" stroke="url(#accent-grad)" stroke-width="1.5" opacity="0.4"/>
  </g>

  <!-- Main content -->
  <!-- "AI EXPLORERS" wordmark -->
  <text x="80" y="220" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="72" fill="url(#title-grad)" letter-spacing="-1">AI Explorers</text>

  <!-- Tagline -->
  <text x="80" y="295" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="30" fill="#C8D4F0" letter-spacing="0.5">Build Your AI Assistant, Piece by Piece</text>

  <!-- Divider line -->
  <rect x="80" y="325" width="120" height="3" fill="url(#accent-grad)" rx="2"/>

  <!-- Description -->
  <text x="80" y="380" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="22" fill="#8B9BC2">7 hands-on modules · Project-based · Ages 10–18</text>
  <text x="80" y="415" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="22" fill="#8B9BC2">Free, open curriculum · No CS background needed</text>

  <!-- CTA pill -->
  <rect x="80" y="455" width="280" height="52" rx="26" fill="url(#accent-grad)" opacity="0.15"/>
  <rect x="80" y="455" width="280" height="52" rx="26" fill="none" stroke="url(#accent-grad)" stroke-width="1.5"/>
  <text x="220" y="487" font-family="Arial, Helvetica, sans-serif" font-weight="600" font-size="18" fill="#C8D4F0" text-anchor="middle">Start Exploring →</text>

  <!-- URL watermark -->
  <text x="80" y="595" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="16" fill="#4A5578">aiexplorers.dev</text>

  <!-- Right side decorative rocket/launch motif -->
  <g transform="translate(1050, 440)" opacity="0.7" filter="url(#glow)">
    <ellipse cx="0" cy="0" rx="60" ry="60" fill="none" stroke="#7C5CFC" stroke-width="1" opacity="0.3"/>
    <ellipse cx="0" cy="0" rx="40" ry="40" fill="none" stroke="#4F8FFF" stroke-width="1" opacity="0.4"/>
    <!-- rocket shape -->
    <path d="M0,-30 L8,-10 L4,-10 L4,15 L-4,15 L-4,-10 L-8,-10 Z" fill="#7C5CFC" opacity="0.9"/>
    <path d="M-4,10 L-14,25 L-4,20 Z" fill="#FF7849" opacity="0.9"/>
    <path d="M4,10 L14,25 L4,20 Z" fill="#FF7849" opacity="0.9"/>
    <circle cx="0" cy="-2" r="4" fill="#4F8FFF"/>
  </g>
</svg>
