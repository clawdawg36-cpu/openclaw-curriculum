<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D0F14;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161B27;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4F8FFF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7C5CFC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00D9B8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="title-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00D9B8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4F8FFF;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="nebula1" cx="25%" cy="40%" r="45%">
      <stop offset="0%" style="stop-color:#00D9B8;stop-opacity:0.10" />
      <stop offset="100%" style="stop-color:#00D9B8;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="nebula2" cx="75%" cy="65%" r="35%">
      <stop offset="0%" style="stop-color:#4F8FFF;stop-opacity:0.08" />
      <stop offset="100%" style="stop-color:#4F8FFF;stop-opacity:0" />
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg-grad)"/>
  <rect width="1200" height="630" fill="url(#nebula1)"/>
  <rect width="1200" height="630" fill="url(#nebula2)"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#00D9B8" stroke-width="1">
    <line x1="0" y1="90" x2="1200" y2="90"/><line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="270" x2="1200" y2="270"/><line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="450" x2="1200" y2="450"/><line x1="0" y1="540" x2="1200" y2="540"/>
    <line x1="150" y1="0" x2="150" y2="630"/><line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="450" y1="0" x2="450" y2="630"/><line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="750" y1="0" x2="750" y2="630"/><line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1050" y1="0" x2="1050" y2="630"/>
  </g>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent-grad)"/>

  <!-- Audience label pill -->
  <rect x="80" y="120" width="220" height="36" rx="18" fill="#00D9B8" opacity="0.15"/>
  <rect x="80" y="120" width="220" height="36" rx="18" fill="none" stroke="#00D9B8" stroke-width="1.5"/>
  <text x="190" y="143" font-family="Arial, Helvetica, sans-serif" font-weight="600" font-size="14" fill="#00D9B8" text-anchor="middle" letter-spacing="1.5">HOMESCHOOL FAMILIES</text>

  <!-- Main title -->
  <text x="80" y="235" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="64" fill="url(#title-grad)" letter-spacing="-1">AI Explorers</text>
  <text x="80" y="305" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="44" fill="#C8D4F0" letter-spacing="-0.5">for Home &amp; Unschool</text>

  <!-- Divider -->
  <rect x="80" y="330" width="100" height="3" fill="url(#accent-grad)" rx="2"/>

  <!-- Key message -->
  <text x="80" y="385" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="22" fill="#8B9BC2">A semester-long project your child will finish</text>
  <text x="80" y="418" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="22" fill="#8B9BC2">and be proud of. Self-paced · Ages 10–18</text>

  <!-- Features row -->
  <g font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#8B9BC2">
    <text x="80" y="470">✓ No prior coding needed</text>
    <text x="80" y="498">✓ Works alongside any homeschool approach</text>
    <text x="80" y="526">✓ Free forever, open license</text>
  </g>

  <!-- URL watermark -->
  <text x="80" y="595" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="16" fill="#4A5578">aiexplorers.dev/homeschool</text>

  <!-- Right side: home + circuit motif -->
  <g transform="translate(960, 315)" opacity="0.6" filter="url(#glow)">
    <!-- House shape -->
    <path d="M0,-80 L80,0 L70,0 L70,80 L-70,80 L-70,0 L-80,0 Z" fill="none" stroke="#00D9B8" stroke-width="2" opacity="0.5"/>
    <path d="M0,-60 L60,0 L55,0 L55,60 L-55,60 L-55,0 L-60,0 Z" fill="#00D9B8" opacity="0.05"/>
    <!-- circuit nodes inside house -->
    <circle cx="0" cy="10" r="10" fill="#00D9B8" opacity="0.8"/>
    <circle cx="-30" cy="40" r="7" fill="#4F8FFF" opacity="0.8"/>
    <circle cx="30" cy="40" r="7" fill="#7C5CFC" opacity="0.8"/>
    <line x1="0" y1="10" x2="-30" y2="40" stroke="#4F8FFF" stroke-width="1.5" opacity="0.6"/>
    <line x1="0" y1="10" x2="30" y2="40" stroke="#7C5CFC" stroke-width="1.5" opacity="0.6"/>
    <!-- stars around -->
    <circle cx="-100" cy="-40" r="3" fill="#F5D769" opacity="0.7"/>
    <circle cx="110" cy="-20" r="2" fill="#4F8FFF" opacity="0.7"/>
    <circle cx="120" cy="60" r="4" fill="#7C5CFC" opacity="0.5"/>
    <circle cx="-110" cy="70" r="3" fill="#00D9B8" opacity="0.6"/>
  </g>
</svg>
