<!--
  AI Explorers — Open Graph & Twitter Card Meta Tags Template
  ===========================================================
  Copy the relevant block into the <head> of each page.
  Replace [PAGE TITLE], [PAGE DESC], and [OG IMAGE FILENAME] with page-specific values.

  Base URL: https://aiexplorers.dev
  OG Images: /og-images/[filename].svg

  Pages:
    index.html      → og-images/homepage.svg
    homeschool.html → og-images/homeschool.svg
    educators.html  → og-images/educators.svg
    schools.html    → og-images/schools.svg
    policy.html     → og-images/policy.svg
    parents         → og-images/parents.svg (if page is added)
-->

<!-- ============================================================
     GENERIC TEMPLATE (copy & fill in per page)
     ============================================================ -->

<!-- Primary Open Graph -->
<meta property="og:type" content="website">
<meta property="og:site_name" content="AI Explorers">
<meta property="og:url" content="https://aiexplorers.dev/[PAGE PATH]">
<meta property="og:title" content="[PAGE TITLE]">
<meta property="og:description" content="[PAGE DESC]">
<meta property="og:image" content="https://aiexplorers.dev/og-images/[OG IMAGE FILENAME]">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:image:type" content="image/svg+xml">
<meta property="og:locale" content="en_US">

<!-- Twitter / X Card -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:site" content="@aiexplorers">
<meta name="twitter:title" content="[PAGE TITLE]">
<meta name="twitter:description" content="[PAGE DESC]">
<meta name="twitter:image" content="https://aiexplorers.dev/og-images/[OG IMAGE FILENAME]">
<meta name="twitter:image:alt" content="[PAGE TITLE] — AI Explorers">

     PAGE-SPECIFIC BLOCKS (ready to paste)
     ============================================================ -->
