<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Module 2: Vision">
  <defs>
    <linearGradient id="m2-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F8FFF"/>
      <stop offset="100%" stop-color="#00D9B8"/>
    </linearGradient>
    <linearGradient id="m2-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F8FFF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00D9B8" stop-opacity="0.15"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="url(#m2-glow)" stroke="url(#m2-grad)" stroke-width="1.5"/>
  <!-- Eye outline — wide lens shape -->
  <path d="M 8 32 Q 20 16 32 16 Q 44 16 56 32 Q 44 48 32 48 Q 20 48 8 32 Z"
        fill="none" stroke="url(#m2-grad)" stroke-width="2"/>
  <!-- Iris -->
  <circle cx="32" cy="32" r="9" fill="none" stroke="#4F8FFF" stroke-width="1.5"/>
  <!-- Pupil -->
  <circle cx="32" cy="32" r="4.5" fill="none" stroke="#00D9B8" stroke-width="1.5"/>
  <circle cx="32" cy="32" r="2" fill="#00D9B8"/>
  <!-- Reflection glint -->
  <circle cx="35" cy="29" r="1" fill="#F0F4FF" opacity="0.8"/>
  <!-- Camera lens rings -->
  <circle cx="32" cy="32" r="13" fill="none" stroke="#4F8FFF" stroke-width="0.75" stroke-dasharray="2 3" opacity="0.5"/>
  <!-- Scan lines -->
  <line x1="10" y1="28" x2="54" y2="28" stroke="#00D9B8" stroke-width="0.75" stroke-dasharray="2 4" opacity="0.4"/>
  <line x1="10" y1="36" x2="54" y2="36" stroke="#00D9B8" stroke-width="0.75" stroke-dasharray="2 4" opacity="0.4"/>
  <!-- Corner focus brackets -->
  <path d="M 16 20 L 11 20 L 11 25" fill="none" stroke="#7C5CFC" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 48 20 L 53 20 L 53 25" fill="none" stroke="#7C5CFC" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 16 44 L 11 44 L 11 39" fill="none" stroke="#7C5CFC" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 48 44 L 53 44 L 53 39" fill="none" stroke="#7C5CFC" stroke-width="1.5" stroke-linecap="round"/>
</svg>
