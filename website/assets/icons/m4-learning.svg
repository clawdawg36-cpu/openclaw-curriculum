<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Module 4: Learning">
  <defs>
    <linearGradient id="m4-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D9B8"/>
      <stop offset="100%" stop-color="#4F8FFF"/>
    </linearGradient>
    <linearGradient id="m4-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D9B8" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#4F8FFF" stop-opacity="0.15"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="url(#m4-glow)" stroke="url(#m4-grad)" stroke-width="1.5"/>
  <!-- Chart axes -->
  <line x1="13" y1="48" x2="13" y2="14" stroke="#4F8FFF" stroke-width="1.75" stroke-linecap="round"/>
  <line x1="13" y1="48" x2="51" y2="48" stroke="#4F8FFF" stroke-width="1.75" stroke-linecap="round"/>
  <!-- Learning curve (upward trend) -->
  <path d="M 16 44 C 20 42 22 38 26 35 C 30 32 32 30 36 24 C 38 20 41 18 46 15"
        fill="none" stroke="url(#m4-grad)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Neural net nodes -->
  <!-- Input layer -->
  <circle cx="16" cy="28" r="3" fill="none" stroke="#00D9B8" stroke-width="1.5"/>
  <circle cx="16" cy="38" r="3" fill="none" stroke="#00D9B8" stroke-width="1.5"/>
  <!-- Hidden layer -->
  <circle cx="28" cy="23" r="3" fill="none" stroke="#7C5CFC" stroke-width="1.5"/>
  <circle cx="28" cy="33" r="3" fill="none" stroke="#7C5CFC" stroke-width="1.5"/>
  <circle cx="28" cy="43" r="3" fill="none" stroke="#7C5CFC" stroke-width="1.5"/>
  <!-- Output layer -->
  <circle cx="40" cy="28" r="3" fill="none" stroke="#4F8FFF" stroke-width="1.5"/>
  <circle cx="40" cy="38" r="3" fill="none" stroke="#4F8FFF" stroke-width="1.5"/>
  <!-- Connections input -> hidden -->
  <line x1="19" y1="28" x2="25" y2="23" stroke="#00D9B8" stroke-width="0.75" opacity="0.5"/>
  <line x1="19" y1="28" x2="25" y2="33" stroke="#00D9B8" stroke-width="0.75" opacity="0.5"/>
  <line x1="19" y1="28" x2="25" y2="43" stroke="#00D9B8" stroke-width="0.75" opacity="0.3"/>
  <line x1="19" y1="38" x2="25" y2="23" stroke="#00D9B8" stroke-width="0.75" opacity="0.3"/>
  <line x1="19" y1="38" x2="25" y2="33" stroke="#00D9B8" stroke-width="0.75" opacity="0.5"/>
  <line x1="19" y1="38" x2="25" y2="43" stroke="#00D9B8" stroke-width="0.75" opacity="0.5"/>
  <!-- Connections hidden -> output -->
  <line x1="31" y1="23" x2="37" y2="28" stroke="#7C5CFC" stroke-width="0.75" opacity="0.5"/>
  <line x1="31" y1="33" x2="37" y2="28" stroke="#7C5CFC" stroke-width="0.75" opacity="0.5"/>
  <line x1="31" y1="43" x2="37" y2="38" stroke="#7C5CFC" stroke-width="0.75" opacity="0.5"/>
  <line x1="31" y1="23" x2="37" y2="38" stroke="#7C5CFC" stroke-width="0.75" opacity="0.3"/>
  <line x1="31" y1="33" x2="37" y2="38" stroke="#7C5CFC" stroke-width="0.75" opacity="0.5"/>
  <!-- Data point dots on curve -->
  <circle cx="22" cy="40" r="2" fill="#00D9B8"/>
  <circle cx="32" cy="28" r="2" fill="#4F8FFF"/>
  <circle cx="44" cy="17" r="2" fill="#7C5CFC"/>
</svg>
